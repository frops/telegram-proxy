services:
  mtg:
    image: nineseconds/mtg:2
    container_name: mtg-proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config.toml:/config.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3129/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
